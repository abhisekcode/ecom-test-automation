name: Regression Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  schedule:
    - cron: '0 2 * * *'

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff check
        run: ruff check .

      - name: Black check
        run: black --check .

  run-tests:
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        browser:
          - chrome
          - firefox
          - edge

    runs-on: ubuntu-latest

    env:
      TEST_USERNAME: ${{ secrets.TEST_USERNAME || 'standard_user' }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD || 'secret_sauce' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create Database
        run: python setup_db.py

      - name: Run Smoke Tests
        if: github.event_name != 'schedule'
        run: pytest -m smoke --headless --browser ${{ matrix.browser }} --alluredir=allure-results --html=report.html --self-contained-html

      - name: Run Regression Tests
        if: github.event_name == 'schedule'
        run: pytest -m regression --headless --browser ${{ matrix.browser }} --alluredir=allure-results --html=report.html --self-contained-html

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.browser }}
          path: screenshots/
          if-no-files-found: ignore

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.browser }}
          path: |
            report.html
            allure-results/
          if-no-files-found: ignore
